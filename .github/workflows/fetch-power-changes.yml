name: Fetch Power-Change Headlines

on:
  schedule:
    # 6:00 AM EST  = 11:00 UTC  (UTC-5 in winter / UTC-4 in summer)
    # 6:00 PM EST  = 23:00 UTC
    # Using 11:00 and 23:00 UTC as conservative EST equivalents (works year-round)
    - cron: "0 11 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write             # needed to push the updated JSON back to the repo

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Check out repo ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip dependencies ─────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Create docs/ directory if it doesn't exist ────────────────────
      - name: Ensure docs directory exists
        run: mkdir -p docs

      # ── 6. Run the scraper ───────────────────────────────────────────────
      - name: Run RSS scraper
        run: python fetch_power_changes.py

      # ── 7. Commit and push updated JSON ──────────────────────────────────
      - name: Commit updated JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/leadership-outputs.json
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update leadership-outputs.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
